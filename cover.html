<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
<style>
  html,body{margin:0;}
  .cover{width:600px;height:400px;position:relative;overflow:hidden;
    background:radial-gradient(120% 120% at 50% 0%,#1b6b4a,#0a3a27);
    font-family:'Pretendard','Malgun Gothic',sans-serif;color:#fff;}
  .cards{position:absolute;top:150px;left:50%;transform:translateX(-50%);display:flex;gap:14px;}
  .c{width:78px;height:117px;border-radius:10px;background:linear-gradient(#fffdf5,#f0e6cc);
    border:2px solid #222;box-shadow:0 12px 26px rgba(0,0,0,.4);display:flex;flex-direction:column;
    align-items:center;justify-content:center;position:relative;}
  .c .em{font-size:40px;}
  .c .bd{position:absolute;bottom:9px;font-size:12px;font-weight:800;color:#fff;
    padding:2px 10px;border-radius:10px;}
  .c1{transform:rotate(-12px) translateY(8px);} .c2{transform:rotate(-4px);}
  .c3{transform:rotate(4px);} .c4{transform:rotate(12px) translateY(8px);}
  .brand{position:absolute;top:42px;left:0;right:0;text-align:center;}
  .brand .t{font-size:13px;letter-spacing:6px;color:#e8b04a;font-weight:800;}
  .brand h1{margin:6px 0 0;font-size:58px;font-weight:900;letter-spacing:-2px;
    text-shadow:0 4px 14px rgba(0,0,0,.5);}
  .tomato{font-size:46px;}
  .tag{position:absolute;bottom:26px;left:0;right:0;text-align:center;font-size:17px;color:#dff0e8;font-weight:600;}
  .chip{position:absolute;bottom:64px;left:50%;transform:translateX(-50%);display:flex;gap:8px;}
  .chip span{background:rgba(226,59,46,.9);font-size:12px;font-weight:800;padding:4px 12px;border-radius:20px;}
</style></head>
<body>
<div class="cover" id="cover">
  <div class="brand">
    <div class="t">TOMATO MINI ARCADE</div>
    <h1><span class="tomato">🍅</span> 토마토 맞고</h1>
  </div>
  <div class="cards">
    <div class="c c1"><span class="em">🌕</span><span class="bd" style="background:#caa23a">광</span></div>
    <div class="c c2"><span class="em">🐦</span><span class="bd" style="background:#b8541e">고도리</span></div>
    <div class="c c3"><span class="em">🦌</span><span class="bd" style="background:#2e6b4f">열끗</span></div>
    <div class="c c4"><span class="em">🌸</span><span class="bd" style="background:#d93a3a">홍단</span></div>
  </div>
  <div class="chip"><span>AI 대전</span><span>온라인 1:1</span><span>고 · 스톱</span></div>
  <div class="tag">화투 한 판, 고냐 스톱이냐</div>
</div>
</body></html>
