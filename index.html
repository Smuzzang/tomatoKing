<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>토마토 맞고 — Tomato Matgo</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='24' fill='%23e23b2e'/%3E%3C/svg%3E" />
<link rel="stylesheet" href="css/style.css?v=90" />
</head>
<body>
<div id="app">

  <!-- ===== 로비 (좌: 메인 / 우: 방 리스트) ===== -->
  <section id="lobby" class="lobby">
    <div id="p2pStatus" class="p2p-status" title="온라인 대전 중계 서버(PeerJS) 연결 상태">
      <span id="p2pDot" class="p2p-dot checking"></span>
      <span class="p2p-label">P2P 중계 상태</span>
    </div>
    <div class="lobby-wrap">
      <div class="lobby-card">
        <div class="brand">
          <h1>토마토 맞고</h1>
          <p class="tagline">화투 2인 고스톱</p>
        </div>

        <label class="field">
          <span>닉네임</span>
          <input id="nickname" type="text" maxlength="8" placeholder="이름을 입력하세요" />
        </label>

        <div class="seg">
          <span class="seg-label">난이도</span>
          <div class="seg-btns" id="diffSeg">
            <button data-diff="easy">쉬움</button>
            <button data-diff="normal" class="on">보통</button>
            <button data-diff="hard">어려움</button>
          </div>
        </div>

        <button id="btnSingle" class="primary big">혼자 하기</button>

        <div class="divider"><span>온라인 대전</span></div>

        <button id="btnHost" class="ghost">방 만들기</button>

        <button id="btnHelp" class="link">규칙 보기</button>
        <div id="help" class="help" hidden></div>
      </div>

      <div class="rooms-panel">
        <div class="pr-head">열린 방 <span id="prCount"></span></div>
        <div id="prList" class="pr-list"><div class="pr-empty">불러오는 중…</div></div>
      </div>
    </div>
    <p class="credit">Tomato Arcade</p>
  </section>

  <!-- ===== 대기방 (호스트=시작 / 게스트=준비) ===== -->
  <section id="waiting" class="waiting" hidden>
    <div class="lobby-card center room-card">
      <h2 id="roomTitleView">대전 방</h2>
      <div class="room-players">
        <div class="rp"><span class="rp-name" id="rpHostName">방장</span><span class="rp-role host">방장</span></div>
        <span class="rp-vs">VS</span>
        <div class="rp"><span class="rp-name" id="rpGuestName">대기 중…</span><span class="rp-role" id="rpGuestRole"></span></div>
      </div>
      <p id="waitMsg" class="muted">상대 접속을 기다리는 중…</p>
      <button id="btnReady" class="primary" hidden>준비</button>
      <button id="btnStart" class="primary" hidden>시작</button>
      <button id="btnCancelHost" class="link">나가기</button>
    </div>
  </section>

  <!-- ===== 선(先) 정하기 — 첫 게임 시작 전 ===== -->
  <section id="firstpick" class="firstpick" hidden>
    <div class="lobby-card center">
      <h2>선(先) 정하기</h2>
      <p class="muted" id="fpSub">카드를 한 장 고르세요 · 더 높은 패가 먼저 시작!</p>
      <div class="fp-cards" id="fpCards"></div>
      <p class="fp-status" id="fpStatus">카드를 고르세요</p>
    </div>
  </section>

  <!-- ===== 게임 테이블 (PC 가로) ===== -->
  <section id="table" class="table" hidden>
    <div class="stage" id="gameStage">
    <button id="muteBtn" class="mute-btn" title="소리 켜기/끄기">🔊</button>
    <button id="leaveBtn" class="leave-btn" title="나가기" hidden>🚪 나가기</button>

    <!-- 가운데: 상대손패 / 상대먹은패 / 바닥 / 내먹은패 / 내손패 -->
    <div class="col col-center">
      <div class="hand backs" id="oppHand"></div>
      <div class="captured strip opp" id="oppCap"></div>
      <div class="center">
        <div class="deck-wrap">
          <div class="deck" id="deck"></div>
          <span class="deck-n" id="deckN">0</span>
        </div>
        <div class="floor" id="floor"></div>
        <div class="turn-tag" id="turnTag"></div>
        <div class="timer" id="timer" hidden></div>
      </div>
      <div class="captured strip me" id="myCap"></div>
      <button id="bombBtn" class="bomb-btn" hidden>💣 폭탄</button>
      <div class="hand" id="myHand"></div>
    </div>

    <!-- 오른쪽: 상대 아바타 → 채팅 → 내 아바타 -->
    <div class="col col-right">
      <div class="pinfo opp">
        <img class="pavatar" id="oppAvatar" alt="" src="img/avatar-opp.png" onerror="this.classList.add('noimg')" />
        <div class="pname" id="oppName">상대</div>
        <div class="pscore" id="oppScore">0점</div>
        <span class="go-badge" id="oppGo" hidden></span>
      </div>

      <!-- 캐릭터 사이: 온라인 채팅 (온라인 대전에서만) -->
      <div id="chat" class="chat" hidden>
        <div class="chat-head">
          <span class="chat-title">💬 채팅</span>
          <button id="chatToggle" class="chat-toggle" type="button" title="접기/펼치기">▾</button>
        </div>
        <div class="chat-body">
          <div class="chat-msgs" id="chatMsgs"></div>
          <div class="chat-input">
            <input id="chatText" type="text" maxlength="60" placeholder="메시지 입력…" autocomplete="off" />
            <button id="chatSend">전송</button>
          </div>
        </div>
      </div>

      <!-- ☕ 커피 내기 방에서만 -->
      <div id="coffeeNote" class="coffee-note" hidden>
        <div class="cn-title">☕ 커피 내기</div>
        <div class="cn-body">져도 안 사도 되지만,<br>양심이 없는 행동입니다.</div>
      </div>

      <div class="pinfo me">
        <img class="pavatar" id="myAvatar" alt="" src="img/avatar-me.png" onerror="this.classList.add('noimg')" />
        <div class="pname" id="myName">나</div>
        <div class="pscore" id="myScore">0점</div>
        <span class="go-badge" id="myGo" hidden></span>
      </div>
    </div>

    <!-- 좌측 중앙: 이벤트 이펙트 (쪽·싹쓸이·피 등) -->
    <div class="event-zone" id="eventZone">
      <div class="toast-wrap" id="toasts"></div>
      <div class="statusbar" id="statusbar"></div>
    </div>
    <!-- 좌측: 흔들기 공개 (상대=위쪽 / 나=아래쪽) -->
    <div class="shake-zone" id="shakeZone"></div>
    </div><!-- /stage -->
  </section>

  <!-- 큰 금박 컷 (N고 / 피박 등) -->
  <div id="bigcut" class="bigcut" hidden></div>

  <!-- ===== 카드 리빌(냄/뒤집기) ===== -->
  <div id="reveal" class="reveal" hidden></div>

  <!-- ===== 화면 플래시 ===== -->
  <div id="flash" class="flash"></div>

  <!-- ===== 모달 ===== -->
  <div id="modal" class="modal" hidden>
    <div class="modal-box" id="modalBox"></div>
  </div>

</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi.js@8/dist/pixi.min.js"></script>
<script src="js/fx.js?v=84"></script>
<script src="js/rooms.js?v=84"></script>
<script src="js/sfx.js?v=84"></script>
<script src="js/cards.js?v=84"></script>
<script src="js/rules.js?v=84"></script>
<script src="js/engine.js?v=84"></script>
<script src="js/ai.js?v=84"></script>
<script src="js/net.js?v=84"></script>
<script src="js/main.js?v=90"></script>
</body>
</html>
